version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sgg-postgres
    environment:
      POSTGRES_DB: sgg
      POSTGRES_USER: sgg_admin
      POSTGRES_PASSWORD: sgg_local_pass
    ports:
      - "5432:5432"
    volumes:
      - sgg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgg_admin -d sgg"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sgg_data:
